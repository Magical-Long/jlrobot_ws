# robot_utils 增强日志默认配置
#
# 当前采用轻量 `key: value` 解析格式：
# - 不依赖额外 YAML 库
# - 但写法上尽量靠近常见配置文件习惯
#
# 最低输出等级：
# 可选值：debug / info / warn / error / fatal
min_level: info

# 是否启用终端颜色输出。
enable_color: true

# 是否显示时间戳。
show_timestamp: true

# 是否显示线程 ID。
show_thread_id: true

# 是否显示源文件名和行号。
show_file_line: true

# 是否显示函数名。
show_function: true

# 是否每条日志都立即 flush。
flush_every_line: true
